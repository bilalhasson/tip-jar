name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: node --check static/widget.js
      - run: npm test

  # Register a Sentry release (version = commit SHA) and associate commits, so
  # errors are attributed to the deploy that introduced them. Runs only on main
  # pushes and only when SENTRY_AUTH_TOKEN is configured as a repo secret.
  sentry-release:
    needs: [python, web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: bilal-hasson
      SENTRY_PROJECT: python-fastapi-tipjar
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so `set-commits --auto` can attribute changes
      - name: Create Sentry release
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        run: |
          curl -sL https://sentry.io/get-cli/ | bash
          VERSION="${GITHUB_SHA}"
          sentry-cli releases new "$VERSION"
          sentry-cli releases set-commits "$VERSION" --auto
          sentry-cli releases finalize "$VERSION"
