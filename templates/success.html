<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thank you!</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 30rem;
           margin: 5rem auto; padding: 0 1rem; text-align: center; color: #111827; }
    .emoji { font-size: 3rem; }
    h1 { margin: .5rem 0; }
    p { color: #4b5563; line-height: 1.6; }
    .amount { font-weight: 700; color: #111827; }
    a { color: #6366f1; }
  </style>
</head>
<body>
  <div class="emoji">☕🎉</div>
  <h1>Thank you for the tip!</h1>
  {% if summary %}
    <p>Your <span class="amount">{{ summary.amount_display }}</span> tip{% if summary.creator %} to {{ summary.creator }}{% endif %} came through. It really means a lot.</p>
  {% else %}
    <p>Your payment went through. It really means a lot.</p>
  {% endif %}
  <p><a href="/demos/">← back</a></p>
</body>
</html>
